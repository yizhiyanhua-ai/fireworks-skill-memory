<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <style>
      text { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
      .title { font-size: 16px; fill: #f8fafc; font-weight: 700; }
      .section { font-size: 12px; fill: #93c5fd; font-weight: 700; letter-spacing: 0.8px; }
      .label { font-size: 12px; fill: #e2e8f0; }
      .sub { font-size: 10px; fill: #94a3b8; }
      .code { font-size: 10px; fill: #7dd3fc; }
      .accent { font-size: 10px; fill: #fbbf24; }
      .arrow { stroke: #475569; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #3b82f6; stroke-width: 1.8; fill: none; marker-end: url(#arrow-blue); }
      .arrow-purple { stroke: #8b5cf6; stroke-width: 1.8; fill: none; marker-end: url(#arrow-purple); }
      .arrow-green { stroke: #10b981; stroke-width: 1.8; fill: none; marker-end: url(#arrow-green); }
      .arrow-amber { stroke: #f59e0b; stroke-width: 1.8; fill: none; marker-end: url(#arrow-amber); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="blueBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="purpleBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="greenBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
    <linearGradient id="amberBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" rx="18"/>
  <rect x="1" y="1" width="1198" height="718" fill="none" stroke="#334155" stroke-width="1.2" rx="18"/>

  <text x="600" y="34" text-anchor="middle" class="title">fireworks-skill-memory — Dual Runtime + Shared Distiller Architecture</text>
  <text x="600" y="54" text-anchor="middle" class="sub">Claude Code hooks and Codex explicit commands share one memory core, one lesson format, and one backend selector.</text>
  <line x1="56" y1="72" x2="1144" y2="72" stroke="#334155" stroke-width="1"/>

  <text x="210" y="102" text-anchor="middle" class="section">CLAUDE RUNTIME</text>
  <text x="600" y="102" text-anchor="middle" class="section">SHARED MEMORY CORE</text>
  <text x="990" y="102" text-anchor="middle" class="section">CODEX RUNTIME</text>

  <rect x="60" y="122" width="300" height="238" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
  <rect x="450" y="122" width="300" height="238" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
  <rect x="840" y="122" width="300" height="238" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>

  <rect x="84" y="146" width="116" height="54" rx="8" fill="url(#blueBox)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="142" y="168" text-anchor="middle" class="label">PreToolUse</text>
  <text x="142" y="184" text-anchor="middle" class="code">pre-skill-inject.py</text>

  <rect x="84" y="222" width="116" height="54" rx="8" fill="url(#purpleBox)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="142" y="244" text-anchor="middle" class="label">PostToolUse</text>
  <text x="142" y="260" text-anchor="middle" class="code">inject-skill-knowledge.py</text>

  <rect x="84" y="298" width="116" height="42" rx="8" fill="url(#purpleBox)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="142" y="324" text-anchor="middle" class="label">error-seed-capture.py</text>

  <rect x="226" y="184" width="110" height="98" rx="8" fill="url(#greenBox)" stroke="#34d399" stroke-width="1.2"/>
  <text x="281" y="208" text-anchor="middle" class="label">Stop Hook</text>
  <text x="281" y="224" text-anchor="middle" class="code">update-skills-knowledge.py</text>
  <text x="281" y="242" text-anchor="middle" class="sub">load transcript</text>
  <text x="281" y="256" text-anchor="middle" class="sub">analyze usage + errors</text>
  <text x="281" y="270" text-anchor="middle" class="sub">merge distilled lessons</text>

  <rect x="474" y="146" width="118" height="58" rx="8" fill="url(#blueBox)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="533" y="170" text-anchor="middle" class="label">store.py</text>
  <text x="533" y="186" text-anchor="middle" class="sub">KNOWLEDGE.md</text>
  <text x="533" y="198" text-anchor="middle" class="sub">CHECKPOINTS.md</text>

  <rect x="604" y="146" width="122" height="58" rx="8" fill="url(#blueBox)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="665" y="170" text-anchor="middle" class="label">transcript.py</text>
  <text x="665" y="186" text-anchor="middle" class="sub">skill detection</text>
  <text x="665" y="198" text-anchor="middle" class="sub">error signal parsing</text>

  <rect x="474" y="226" width="252" height="114" rx="8" fill="url(#amberBox)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="600" y="248" text-anchor="middle" class="label">distiller.py</text>
  <text x="600" y="266" text-anchor="middle" class="sub">Distiller interface + backend selector</text>
  <text x="600" y="286" text-anchor="middle" class="code">ClaudeCliDistiller</text>
  <text x="600" y="302" text-anchor="middle" class="code">OpenAIDistiller</text>
  <text x="600" y="318" text-anchor="middle" class="code">NullDistiller</text>

  <rect x="864" y="146" width="116" height="54" rx="8" fill="url(#blueBox)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="922" y="168" text-anchor="middle" class="label">inject</text>
  <text x="922" y="184" text-anchor="middle" class="code">top-ranked lessons</text>

  <rect x="864" y="222" width="116" height="54" rx="8" fill="url(#purpleBox)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="922" y="244" text-anchor="middle" class="label">checkpoint</text>
  <text x="922" y="260" text-anchor="middle" class="code">raw session notes</text>

  <rect x="1000" y="184" width="116" height="98" rx="8" fill="url(#greenBox)" stroke="#34d399" stroke-width="1.2"/>
  <text x="1058" y="208" text-anchor="middle" class="label">flush</text>
  <text x="1058" y="224" text-anchor="middle" class="code">summary / session / stdin</text>
  <text x="1058" y="242" text-anchor="middle" class="sub">extract explicit lessons</text>
  <text x="1058" y="256" text-anchor="middle" class="sub">write back to knowledge</text>
  <text x="1058" y="270" text-anchor="middle" class="sub">without full transcript hooks</text>

  <line x1="200" y1="173" x2="474" y2="173" class="arrow-blue"/>
  <line x1="200" y1="249" x2="474" y2="173" class="arrow-blue"/>
  <line x1="200" y1="319" x2="474" y2="285" class="arrow-purple"/>
  <line x1="336" y1="233" x2="474" y2="285" class="arrow-green"/>

  <line x1="726" y1="173" x2="864" y2="173" class="arrow-blue"/>
  <line x1="592" y1="173" x2="864" y2="249" class="arrow-purple"/>
  <line x1="726" y1="285" x2="1000" y2="233" class="arrow-green"/>

  <text x="600" y="386" text-anchor="middle" class="section">BACKEND SELECTION + OBSERVABILITY</text>
  <rect x="60" y="404" width="1080" height="114" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>

  <rect x="94" y="432" width="168" height="54" rx="8" fill="url(#amberBox)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="178" y="454" text-anchor="middle" class="label">SKILLS_DISTILLER_BACKEND</text>
  <text x="178" y="470" text-anchor="middle" class="code">claude-cli | openai | null</text>

  <rect x="320" y="432" width="176" height="54" rx="8" fill="url(#amberBox)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="408" y="454" text-anchor="middle" class="label">Claude CLI backend</text>
  <text x="408" y="470" text-anchor="middle" class="sub">fallback model chain</text>

  <rect x="514" y="422" width="212" height="74" rx="8" fill="url(#amberBox)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="620" y="444" text-anchor="middle" class="label">OpenAI backend</text>
  <text x="620" y="460" text-anchor="middle" class="code">OPENAI_API_KEY / BASE_URL / MODEL</text>
  <text x="620" y="476" text-anchor="middle" class="sub">chat.completions parsing + raw preview + HTTP/body logs</text>

  <rect x="754" y="432" width="156" height="54" rx="8" fill="url(#amberBox)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="832" y="454" text-anchor="middle" class="label">Null backend</text>
  <text x="832" y="470" text-anchor="middle" class="sub">safe SKIP for dry runs</text>

  <rect x="948" y="422" width="162" height="74" rx="8" fill="url(#greenBox)" stroke="#34d399" stroke-width="1.2"/>
  <text x="1029" y="444" text-anchor="middle" class="label">Debug logs</text>
  <text x="1029" y="460" text-anchor="middle" class="code">SKILLS_DISTILLER_DEBUG / LOG</text>
  <text x="1029" y="476" text-anchor="middle" class="sub">DISTILLER_ERR + DISTILLER_RAW</text>

  <line x1="600" y1="340" x2="600" y2="422" class="arrow-amber"/>

  <text x="600" y="558" text-anchor="middle" class="section">SHARED STORAGE LAYOUT</text>
  <rect x="190" y="578" width="820" height="98" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
  <text x="222" y="602" class="code">&lt;memory-home&gt;/</text>
  <text x="222" y="622" class="code">├── global/KNOWLEDGE.md</text>
  <text x="458" y="622" class="sub">← cross-skill principles</text>
  <text x="222" y="642" class="code">└── skills/&lt;skill&gt;/KNOWLEDGE.md</text>
  <text x="458" y="642" class="sub">← distilled reusable lessons</text>
  <text x="222" y="662" class="code">└── skills/&lt;skill&gt;/CHECKPOINTS.md</text>
  <text x="458" y="662" class="sub">← raw notes, only promoted by explicit flush</text>

  <line x1="533" y1="204" x2="410" y2="578" class="arrow-green" stroke-dasharray="5,4"/>
  <line x1="533" y1="204" x2="790" y2="578" class="arrow-green" stroke-dasharray="5,4"/>
</svg>
